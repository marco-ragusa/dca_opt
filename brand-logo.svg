<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- ICONA: Barattolo di Pesto in stile geometrico flat con illuminazione split (chiaro/scuro) -->
  <g transform="translate(80, 100) scale(1.05)">

    <!-- CONTENUTO DEL BARATTOLO (Pesto) -->
    <!-- Corpo Sinistro (Chiaro - Menta) -->
    <path d="M 0,-38 L -25,-38 Q -42,-38 -42,-20 L -42,55 Q -42,75 -20,75 L 0,75 Z" fill="#34D399"/>
    <!-- Corpo Destro (Scuro - Smeraldo) -->
    <path d="M 0,-38 L 25,-38 Q 42,-38 42,-20 L 42,55 Q 42,75 20,75 L 0,75 Z" fill="#10B981"/>

    <!-- COLLO DEL BARATTOLO (Vetro/Pesto compresso) -->
    <!-- Collo Sinistro -->
    <path d="M 0,-48 L -25,-48 L -25,-38 L 0,-38 Z" fill="#6EE7B7"/>
    <!-- Collo Destro -->
    <path d="M 0,-48 L 25,-48 L 25,-38 L 0,-38 Z" fill="#059669"/>

    <!-- ETICHETTA MINIMALISTA -->
    <!-- Etichetta Sinistra (Bianco) -->
    <path d="M 0,-5 L -42,-5 L -42,35 L 0,35 Z" fill="#FFFFFF"/>
    <!-- Etichetta Destra (Grigio Ghiaccio) -->
    <path d="M 0,-5 L 42,-5 L 42,35 L 0,35 Z" fill="#F1F5F9"/>

    <!-- ICONA SULL'ETICHETTA (Piccola foglia geometrica a due toni) -->
    <path d="M 0,7 L -10,16 L 0,27 Z" fill="#10B981"/>
    <path d="M 0,7 L 10,16 L 0,27 Z" fill="#047857"/>

    <!-- COPERCHIO DEL BARATTOLO -->
    <!-- Coperchio Sinistro (Grigio Ardesia Chiaro) -->
    <path d="M 0,-70 L -28,-70 Q -32,-70 -32,-66 L -32,-48 L 0,-48 Z" fill="#475569"/>
    <!-- Coperchio Destro (Grigio Ardesia Scuro - richiama il colore del testo PESTO) -->
    <path d="M 0,-70 L 28,-70 Q 32,-70 32,-66 L 32,-48 L 0,-48 Z" fill="#0F172A"/>

    <!-- RIFLESSO TECH SUL COPERCHIO (Dettaglio extra per il lato sinistro) -->
    <path d="M -26,-66 L -20,-66 L -20,-52 L -26,-52 Z" fill="#94A3B8" opacity="0.3"/>

  </g>

  <!-- TESTO PESTO ENGINE -->
  <g transform="translate(190, 115)">
    <!-- PESTO -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="82" font-weight="900" fill="#0F172A" letter-spacing="-2">PESTO</text>

    <!-- ENGINE -->
    <text x="270" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="82" font-weight="300" fill="#10B981" letter-spacing="-1.5">ENGINE</text>

    <!-- TAGLINE -->
    <text x="8" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="16" font-weight="700" fill="#64748B" letter-spacing="5">PORTFOLIO REBALANCING</text>
  </g>
</svg>